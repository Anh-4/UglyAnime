name: Deploy Ugly Anime to GitHub Pages

# Mỗi lần push lên main -> tự build & deploy.
# Sau khi deploy, ai mở app .exe (thin shell) sẽ nhận bản mới ở lần mở kế tiếp.
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install
      - run: npm run build        # vite build -> dist (KHÔNG nhúng key)
      - uses: actions/configure-pages@v5
        with:
          enablement: true        # tự bật Pages nếu chưa bật
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
